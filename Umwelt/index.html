<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<title>Umwelt</title>
<!-- fonts loaded async to avoid blocking in headless/offline -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050403; overflow: hidden; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
</style>
</head>
<body>
<div id="obs-root"></div>

<!-- Neural editor overlay — hidden until opened from panel button -->
<div id="editor-overlay">
  <div id="editor-toolbar">
    <div id="editor-title">UMWELT · neural editor</div>
    <div id="editor-hint">drag from nodes to wire · right-click to delete</div>
    <div id="body-panel">
      <span class="body-panel-title">body</span>
      <label class="body-row">
        <span class="body-label">turn</span>
        <input class="body-range" id="body-turn" type="range" min="10" max="1000" value="100">
        <span class="body-val" id="body-turn-val">1.0</span>
      </label>
      <label class="body-row">
        <span class="body-label">speed</span>
        <input class="body-range" id="body-speed" type="range" min="10" max="500" value="100">
        <span class="body-val" id="body-speed-val">1.0</span>
      </label>
    </div>
    <button class="btn mono" id="body-editor-btn" type="button">sensors</button>
    <div id="editor-actions">
      <button class="btn mono" id="editor-import-btn" type="button">import</button>
      <button class="btn mono" id="editor-export-btn" type="button">export</button>
      <button class="btn mono" id="editor-reset-btn" type="button">reset</button>
      <button class="btn primary mono" id="editor-run-btn" type="button">▶ run</button>
    </div>
    <input type="file" id="editor-import-file" accept=".json" style="display:none">
  </div>
  <div id="editor-stage">
    <canvas id="editor-canvas"></canvas>
    <div id="editor-menu"></div>
    <div id="body-editor-panel"></div>
    <div id="connection-inspector-panel"></div>
  </div>
</div>

<script type="module" src="/src/observation-app.js"></script>
</body>
</html>
